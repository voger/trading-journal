name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title ${{ github.ref_name }} \
            --generate-notes

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: TradingJournal_linux.tar.gz
          - os: windows-latest
            asset_name: TradingJournal_windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          sudo apt-get install -y libfuse2

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller pillow
          bash build_app.sh

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m venv venv
          call venv\Scripts\activate.bat
          pip install -r requirements.txt pyinstaller pillow
          build_app.bat

      - name: Build Windows Installer
        if: runner.os == 'Windows'
        shell: cmd
        run: makensis build_installer_windows.nsi

      - name: Upload portable archive to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/${{ matrix.asset_name }} --repo ${{ github.repository }}

      - name: Upload AppImage to Release
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/TradingJournal.AppImage --repo ${{ github.repository }}

      - name: Upload Windows Installer to Release
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist/TradingJournal_Setup.exe --repo ${{ github.repository }}
