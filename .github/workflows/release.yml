name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: TradingJournal_linux.tar.gz
          - os: windows-latest
            asset_name: TradingJournal_windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt pyinstaller pillow
          bash build_app.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m venv venv
          call venv\Scripts\activate.bat
          pip install -r requirements.txt pyinstaller pillow
          build_app.bat

      - name: Upload asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
